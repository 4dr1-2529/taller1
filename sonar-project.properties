# SonarCloud — Tesis Dashboard
sonar.sourceEncoding=UTF-8

# Código fuente analizado (excluir scripts ops, migraciones, QA y docs)
sonar.sources=backend/src,frontend/src,machine-learning/app,machine-learning/train.py
sonar.tests=backend/tests,backend/tests

sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/.next/**,\
**/prisma/migrations/**,\
**/plan-pruebas/**,\
**/scripts/**,\
**/estado-del-arte-software/**,\
**/python-ia/**,\
**/docs/**,\
**/*.md,\
**/.gitignore,\
**/database/**

# Detección de secretos — exclusiones explícitas
sonar.text.exclusions=\
**/prisma/migrations/**,\
**/plan-pruebas/**,\
**/scripts/**,\
**/*.md,\
**/generate_matriz.py,\
**/.gitignore

# Hotspots / credenciales en scripts QA y migración histórica
sonar.issue.ignore.multicriteria=qa_evidence
sonar.issue.ignore.multicriteria.qa_evidence.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.qa_evidence.resourceKey=**/scripts/evidence/**

sonar.issue.ignore.multicriteria=qa_plan
sonar.issue.ignore.multicriteria.qa_plan.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.qa_plan.resourceKey=**/plan-pruebas/**

sonar.issue.ignore.multicriteria=qa_smoke
sonar.issue.ignore.multicriteria.qa_smoke.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.qa_smoke.resourceKey=**/smoke-tests.mjs

sonar.issue.ignore.multicriteria=migration_secrets
sonar.issue.ignore.multicriteria.migration_secrets.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.migration_secrets.resourceKey=**/prisma/migrations/**

sonar.issue.ignore.multicriteria=migration_all
sonar.issue.ignore.multicriteria.migration_all.ruleKey=*
sonar.issue.ignore.multicriteria.migration_all.resourceKey=**/20250604180000_unify_password_mbappe29/**

sonar.issue.ignore.multicriteria=railway_scripts
sonar.issue.ignore.multicriteria.railway_scripts.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.railway_scripts.resourceKey=**/backend/scripts/railway-*.mjs
