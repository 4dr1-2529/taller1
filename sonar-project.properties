sonar.projectKey=tesis-dashboard
sonar.projectName=Tesis Dashboard - Riesgo de Desercion
sonar.projectVersion=2.0.0

sonar.sources=backend/src,frontend/src,machine-learning/app,machine-learning/utils
sonar.tests=backend/tests,machine-learning/tests
sonar.test.inclusions=**/*.test.mjs,**/*.test.ts,**/test_*.py

sonar.exclusions=\
**/node_modules/**,\
**/.next/**,\
**/dist/**,\
**/build/**,\
**/coverage/**,\
**/.venv/**,\
**/venv/**,\
**/__pycache__/**,\
**/*.joblib,\
**/models/**,\
**/prisma/migrations/**,\
**/.env,\
**/.env.*,\
**/public/**,\
**/*.tsbuildinfo,\
**/database/**

sonar.coverage.exclusions=\
**/tests/**,\
**/*.test.mjs,\
**/*.test.ts,\
**/test_*.py,\
backend/src/index.ts

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
sonar.python.version=3.11

sonar.sourceEncoding=UTF-8
